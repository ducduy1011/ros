controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

wheel_velocity_controller:
  ros__parameters:
    joints:
      - TraiTren_Joint
      - PhaiTren_Joint
      - TraiDuoi_Joint
      - PhaiDuoi_Joint
    interface_name: velocity
